[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MIT-0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = [
    { name = "epaint_default_fonts", allow = ["OFL-1.1", "Ubuntu-font-1.0"] },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
deny = [
    { crate = "anyhow:<1.0.103", reason = "RUSTSEC-2026-0190 is fixed in 1.0.103" },
    { crate = "crossbeam-epoch:<0.9.20", reason = "RUSTSEC-2026-0204 is fixed in 0.9.20" },
    { crate = "quick-xml:<0.41.0", reason = "RUSTSEC-2026-0194 and RUSTSEC-2026-0195 are fixed in 0.41.0" },
    { crate = "ttf-parser", reason = "RUSTSEC-2026-0192 reports no maintained release" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
