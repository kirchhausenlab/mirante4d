# Generated by `cargo xtask verification-sync`; edit verification/registry.json.

[profile.default]
retries = 0
flaky-result = "fail"
fail-fast = false
test-threads = 4

[test-groups]
unit = { max-threads = 4 }
contract = { max-threads = 2 }
ui = { max-threads = 1 }

[[profile.default.overrides]]
filter = 'package(mirante4d-analysis) | package(mirante4d-application) | package(mirante4d-data) | package(mirante4d-dataset) | package(mirante4d-dataset-runtime) | package(mirante4d-domain) | package(mirante4d-identity) | package(mirante4d-project-model) | package(mirante4d-render-api) | package(mirante4d-render-reference) | package(mirante4d-render-wgpu) | package(mirante4d-renderer) | package(mirante4d-settings) | package(xtask)'
test-group = 'unit'
slow-timeout = { period = "500ms", terminate-after = 4 }

[[profile.default.overrides]]
filter = 'package(mirante4d-format) | package(mirante4d-import) | package(mirante4d-project-store) | package(mirante4d-storage)'
test-group = 'contract'
slow-timeout = { period = "5s", terminate-after = 4 }

[[profile.default.overrides]]
filter = 'package(mirante4d-app)'
test-group = 'ui'
slow-timeout = { period = "2s", terminate-after = 5 }

[profile.leaf]
inherits = "default"
global-timeout = "12m"

[profile.leaf.junit]
path = "junit.xml"
report-name = "mirante4d-verification-leaf"
store-success-output = false
store-failure-output = true

[profile.pr]
inherits = "default"
global-timeout = "5m"

[profile.pr.junit]
path = "junit.xml"
report-name = "mirante4d-pr-rust"
store-success-output = false
store-failure-output = true

[profile.trusted-gpu]
inherits = "default"
test-threads = 1
global-timeout = "15m"

[[profile.trusted-gpu.overrides]]
filter = '(package(mirante4d-renderer) & test(/^gpu::/)) | (package(mirante4d-render-wgpu) & test(/^gpu_tests::/))'
slow-timeout = { period = "20s", terminate-after = 3 }
